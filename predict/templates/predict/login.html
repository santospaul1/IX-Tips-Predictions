{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - IX-Tips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,0.12), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(99,102,241,0.08), transparent 40%),
        linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Inter', sans-serif;
    }

    body.dark {
      background:
        radial-gradient(circle at 20% 20%, rgba(59,130,246,0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(99,102,241,0.1), transparent 40%),
        linear-gradient(160deg, #060912 0%, #0f172a 100%);
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-brand .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3C91E6, #6366f1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(60,145,230,0.35);
    }

    .login-brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #f1f5f9;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }

    .login-brand p {
      font-size: 0.82rem;
      color: #94a3b8;
      margin: 0;
    }

    .login-card {
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 20px;
      padding: 32px 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field-label i { font-size: 0.9rem; }

    .field-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid rgba(71, 85, 105, 0.6);
      background: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field-input:focus {
      border-color: #3C91E6;
      box-shadow: 0 0 0 3px rgba(60,145,230,0.2);
    }

    .field-input::placeholder { color: #475569; }

    .login-btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3C91E6, #6366f1);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(60,145,230,0.35);
      letter-spacing: 0.02em;
    }

    .login-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(60,145,230,0.45);
    }

    .login-btn:active { transform: translateY(0); }

    .error-banner {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(185, 28, 28, 0.18);
      border: 1px solid rgba(252, 165, 165, 0.4);
      color: #fca5a5;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-brand">
      <div class="brand-icon"><i class='bx bx-football'></i></div>
      <h1>IX-Tips</h1>
      <p>Admin access only</p>
    </div>

    <div class="login-card">
      <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="field-group">
          <div class="field-label"><i class='bx bx-user'></i> Username</div>
          <input type="text" name="username" class="field-input" placeholder="Enter username" autofocus>
        </div>
        <div class="field-group">
          <div class="field-label"><i class='bx bx-lock-alt'></i> Password</div>
          <input type="password" name="password" class="field-input" placeholder="Enter password">
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>

      {% if form.errors %}
      <div class="error-banner">
        <i class='bx bx-error-circle'></i>
        Invalid credentials. Please try again.
      </div>
      {% endif %}
    </div>
  </div>

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
