<div class="page-header{% if header_class %} {{ header_class }}{% endif %}">
  <div>
    <h1 class="section-title">{{ header_title }}</h1>
    {% if header_subtitle %}
    <div class="section-subtitle">{{ header_subtitle }}</div>
    {% endif %}
  </div>
  {% if header_actions_template %}
  <div class="{% if header_actions_class %}{{ header_actions_class }}{% else %}action-row{% endif %}">
    {% include header_actions_template %}
  </div>
  {% endif %}
</div>
