app = 'ix-tips-predictions'
primary_region = 'jnb'
console_command = '/code/manage.py shell'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = 'sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput"'

[processes]
  app    = 'gunicorn --bind :8080 --workers 2 --preload score_predictor.wsgi'
  celery = 'celery -A score_predictor worker --loglevel=INFO --concurrency=2'
  beat   = 'celery -A score_predictor beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  processes = ['celery', 'beat']

[[statics]]
  guest_path = '/code/staticfiles'
  url_prefix = '/static/'
