# fly.toml app configuration file generated for ix-tips-predictions on 2026-05-24T11:38:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ix-tips-predictions'
primary_region = 'jnb'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[processes]
  app = 'gunicorn --bind :8000 --workers 2 score_predictor.wsgi'
  celery = 'celery -A score_predictor worker --loglevel=INFO'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['app', 'celery', 'beat']

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
