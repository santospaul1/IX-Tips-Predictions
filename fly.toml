app = "ix-tips-predictions"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[processes]
  app    = "sh -c 'python manage.py migrate --run-syncdb && gunicorn score_predictor.wsgi --bind 0.0.0.0:8080 --workers 2 --timeout 120'"
  worker = "celery -A score_predictor worker --loglevel=info --concurrency=2"
  beat   = "celery -A score_predictor beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["app", "worker", "beat"]
